<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Balot">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0a07">
<title>بالوت | Balot</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230d0a07'/><text y='75' x='50' text-anchor='middle' font-size='64' fill='%23c9a84c'>♠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
/* ─── VARIABLES ─── */
:root{
  --gold:#c9a84c;--gold2:#e8c96a;
  --red:#b83227;--red2:#d94535;
  --cream:#f0e2c4;--dark:#0d0a07;
  --border:rgba(201,168,76,.28);
  --r:13px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
/* ─── FOUNDATION ─── */
html,body{height:100%;background:#0d0a07;overscroll-behavior:none}
body{font-family:'Cinzel',serif;display:-webkit-flex;display:flex;-webkit-justify-content:center;justify-content:center}
/* ─── APP SHELL ─── */
#app{
  width:100%;max-width:430px;min-height:100%;
  background:#0f130c;
  background-image:
    radial-gradient(ellipse 70% 40% at 15% 8%,rgba(120,20,20,.10) 0%,transparent 100%),
    radial-gradient(ellipse 60% 60% at 85% 88%,rgba(10,30,15,.55) 0%,transparent 100%);
  display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  position:relative;overflow-x:hidden;
  padding-bottom:calc(28px + var(--sb));
}
/* dot texture */
#app::after{
  content:'';position:fixed;inset:0;max-width:430px;
  background-image:radial-gradient(circle,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:6px 6px;pointer-events:none;z-index:0;
}
#app>*{position:relative;z-index:1}

/* ─── HEADER ─── */
.hdr{
padding:calc(var(–st) + 22px) 20px 18px;
text-align:center;
border-bottom:1px solid var(–border);
background:linear-gradient(180deg,rgba(201,168,76,.07) 0%,transparent 100%);
-webkit-flex-shrink:0;flex-shrink:0;
}
.hdr-suits{display:-webkit-flex;display:flex;-webkit-justify-content:center;justify-content:center;gap:12px;margin-bottom:6px;font-size:17px;line-height:1}
.sb{color:#ddd}.sr{color:#d94535}
/* Title — gradient text with Firefox fallback */
.hdr-title{
font-family:‘Cinzel Decorative’,serif;font-size:24px;
letter-spacing:4px;color:#e8c96a;
background:linear-gradient(135deg,#c9a84c 0%,#e8c96a 50%,#c9a84c 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
}
.hdr-sub{font-family:‘Amiri’,serif;font-size:13px;color:rgba(201,168,76,.42);letter-spacing:2px;margin-top:3px}

/* ─── SETTINGS ─── */
.settings{display:-webkit-flex;display:flex;gap:8px;padding:12px 14px 0;-webkit-align-items:center;align-items:center}
.tgt-wrap{
-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;gap:8px;
background:rgba(255,255,255,.03);border:1px solid var(–border);
border-radius:10px;padding:9px 12px;min-width:0;
}
.tgt-lbl{font-size:10px;color:rgba(201,168,76,.38);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
/* Fully normalised number input */
.tgt-input{
-webkit-flex:1;flex:1;background:transparent;border:none;outline:none;
color:var(–gold2);font-family:‘Cinzel’,serif;font-size:16px;
text-align:right;width:0;min-width:0;
-webkit-appearance:none;-moz-appearance:textfield;appearance:none;
}
.tgt-input::-webkit-inner-spin-button,.tgt-input::-webkit-outer-spin-button{display:none}
.reset-btn{
background:rgba(180,40,30,.09);border:1px solid rgba(180,40,30,.22);
border-radius:10px;color:rgba(210,80,60,.62);
font-family:‘Cinzel’,serif;font-size:11px;letter-spacing:1px;
padding:10px 14px;cursor:pointer;white-space:nowrap;
-webkit-appearance:none;appearance:none;
}
.reset-btn:active{background:rgba(180,40,30,.20);color:#e74c3c}

/* ─── SCOREBOARD ─── */
.scoreboard{
display:-webkit-flex;display:flex;gap:10px;padding:12px 14px 0;
}
.tcard{
-webkit-flex:1;flex:1;
background:rgba(255,255,255,.03);
border:1.5px solid var(–border);border-radius:var(–r);
padding:13px 10px 12px;text-align:center;
position:relative;overflow:hidden;
-webkit-transition:border-color .3s,box-shadow .3s;transition:border-color .3s,box-shadow .3s;
}
.tcard::before{
content:’’;position:absolute;top:0;left:10%;right:10%;height:2px;
background:linear-gradient(90deg,transparent,var(–gold),transparent);
opacity:0;-webkit-transition:opacity .3s;transition:opacity .3s;
}
.tcard.win{border-color:rgba(201,168,76,.55);box-shadow:0 0 18px rgba(201,168,76,.10)}
.tcard.win::before{opacity:1}
/* Team name text input — fully styled, no browser chrome */
.tname{
font-family:‘Amiri’,serif;font-size:16px;font-weight:700;
color:var(–cream);background:transparent;border:none;
border-bottom:1px solid rgba(201,168,76,.22);
text-align:center;width:100%;outline:none;
padding:2px 4px 3px;margin-bottom:10px;display:block;
-webkit-appearance:none;appearance:none;
letter-spacing:.3px;
}
.tname::placeholder{color:rgba(201,168,76,.25)}
.tscore{
font-family:‘Cinzel Decorative’,serif;font-size:44px;
line-height:1;color:var(–gold);display:inline-block;
-webkit-transition:color .3s;transition:color .3s;
}
.tcard.win .tscore{color:#fff}
.twins{margin-top:6px;font-size:10px;color:rgba(201,168,76,.38);letter-spacing:1px;text-transform:uppercase}
.twins b{color:var(–gold);font-weight:600}

/* ─── PROGRESS ─── */
.prog-sec{padding:10px 14px 0}
.prog-row{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;margin-bottom:5px}
.prog-name{font-size:10px;color:rgba(201,168,76,.38);letter-spacing:.5px;min-width:50px;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-track{-webkit-flex:1;flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.04)}
.prog-fill{height:100%;border-radius:10px;-webkit-transition:width .5s ease;transition:width .5s ease;width:0}
.f1{background:linear-gradient(90deg,#b8860b,#e8c96a)}
.f2{background:linear-gradient(90deg,#8b1a1a,#d94535)}
.prog-val{font-size:10px;color:rgba(201,168,76,.32);min-width:28px;text-align:right}

/* ─── DIVIDER ─── */
.div{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;padding:14px 14px 8px}
.div-line{-webkit-flex:1;flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.18),transparent)}
.div-txt{font-size:9px;color:rgba(201,168,76,.32);letter-spacing:2px;text-transform:uppercase;white-space:nowrap}

/* ─── ENTRY ─── */
.entry-sec{padding:0 14px}
.entry-grid{display:-webkit-flex;display:flex;gap:10px;margin-bottom:10px}
.eg{-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:5px}
.elbl{font-size:9px;color:rgba(201,168,76,.42);letter-spacing:1.5px;text-transform:uppercase;text-align:center}
/* Score inputs — fully normalised */
.einput{
background:rgba(255,255,255,.04);
border:1.5px solid var(–border);
border-radius:11px;color:var(–cream);
font-family:‘Cinzel’,serif;font-size:26px;
text-align:center;padding:13px 6px;
outline:none;width:100%;display:block;
-webkit-appearance:none;-moz-appearance:textfield;appearance:none;
-webkit-transition:border-color .2s,background .2s;transition:border-color .2s,background .2s;
}
.einput::-webkit-inner-spin-button,.einput::-webkit-outer-spin-button{display:none}
.einput:focus{border-color:rgba(201,168,76,.62);background:rgba(201,168,76,.06)}

/* BID BOX */
.bid-box{
background:rgba(100,10,10,.09);border:1px solid rgba(110,15,15,.22);
border-radius:11px;padding:10px 12px;margin-bottom:10px;
}
.bid-lbl{font-size:9px;color:rgba(201,168,76,.38);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
/* Fully custom select across all browsers */
.sel-wrap{position:relative}
.sel-wrap::after{
content:‘▾’;position:absolute;right:12px;top:50%;
-webkit-transform:translateY(-50%);transform:translateY(-50%);
color:rgba(201,168,76,.38);font-size:12px;pointer-events:none;line-height:1;
}
.bid-sel{
width:100%;background:rgba(255,255,255,.04);
border:1px solid var(–border);border-radius:9px;
color:var(–gold2);font-family:‘Cinzel’,serif;font-size:16px;
padding:10px 32px 10px 12px;outline:none;cursor:pointer;
-webkit-appearance:none;-moz-appearance:none;appearance:none;display:block;
}
.bid-sel::-ms-expand{display:none}
.bid-sel option{background:#18120a;color:var(–cream)}

/* TOGGLES */
.toggles{display:-webkit-flex;display:flex;gap:8px;margin-bottom:10px}
.tog{
-webkit-flex:1;flex:1;
background:rgba(255,255,255,.03);
border:1px solid rgba(201,168,76,.18);border-radius:10px;
color:rgba(201,168,76,.32);font-family:‘Cinzel’,serif;
font-size:10px;letter-spacing:.5px;
padding:10px 4px 8px;cursor:pointer;text-align:center;line-height:1.4;
-webkit-appearance:none;appearance:none;display:block;width:100%;
-webkit-transition:background .18s,border-color .18s,color .18s;
transition:background .18s,border-color .18s,color .18s;
}
.tog-icon{font-size:15px;display:block;margin-bottom:2px}
.tog.on{background:rgba(201,168,76,.11);border-color:rgba(201,168,76,.48);color:var(–gold2)}
.tog:active{opacity:.72}

/* ADD BUTTON */
.add-btn{
width:100%;background:rgba(201,168,76,.10);
border:1.5px solid rgba(201,168,76,.35);border-radius:13px;
color:var(–gold2);font-family:‘Cinzel’,serif;font-size:14px;
letter-spacing:2px;text-transform:uppercase;padding:15px;
cursor:pointer;-webkit-appearance:none;appearance:none;display:block;
-webkit-transition:background .18s,-webkit-transform .12s;transition:background .18s,transform .12s;
}
.add-btn:active{background:rgba(201,168,76,.18);-webkit-transform:scale(.98);transform:scale(.98)}

/* ─── HISTORY ─── */
.hist-sec{padding:0 14px}
.hist-hdr{display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center;margin-bottom:8px}
.hist-ttl{font-size:9px;color:rgba(201,168,76,.32);letter-spacing:2px;text-transform:uppercase}
.clr-btn{
font-family:‘Cinzel’,serif;font-size:9px;letter-spacing:1px;
color:rgba(190,50,40,.48);background:rgba(190,50,40,.06);
border:1px solid rgba(190,50,40,.16);border-radius:6px;
padding:5px 9px;cursor:pointer;-webkit-appearance:none;appearance:none;
}
.clr-btn:active{color:#e74c3c;background:rgba(190,50,40,.14)}
.rlist{
display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;
gap:6px;max-height:240px;overflow-y:auto;
-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-right:2px;
}
.rlist::-webkit-scrollbar{width:3px}
.rlist::-webkit-scrollbar-track{background:transparent}
.rlist::-webkit-scrollbar-thumb{background:rgba(201,168,76,.14);border-radius:10px}
/* Round row */
.rrow{
background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.052);
border-radius:10px;padding:9px 10px;
display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;
gap:6px;-webkit-flex-wrap:wrap;flex-wrap:wrap;
-webkit-animation:sIn .22s ease;animation:sIn .22s ease;
}
@-webkit-keyframes sIn{from{opacity:0;-webkit-transform:translateY(-6px)}to{opacity:1;-webkit-transform:none}}
@keyframes sIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.rn{
font-size:9px;color:rgba(201,168,76,.28);
border:1px solid rgba(201,168,76,.10);border-radius:50%;
width:20px;height:20px;display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
-webkit-flex-shrink:0;flex-shrink:0;
}
.rt{-webkit-flex:1;flex:1;font-size:10px;color:rgba(240,226,196,.52);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rp{font-family:‘Cinzel Decorative’,serif;font-size:17px;min-width:34px;text-align:center}
.rp.g{color:var(–gold2)}.rp.r{color:var(–red2)}
.rsep{font-size:10px;color:rgba(255,255,255,.10)}
.rdel{background:none;border:none;color:rgba(190,50,40,.28);font-size:14px;padding:3px 4px;cursor:pointer;-webkit-appearance:none;appearance:none;-webkit-flex-shrink:0;flex-shrink:0;line-height:1}
.rdel:active{color:#e74c3c}
.rtags{width:100%;display:-webkit-flex;display:flex;gap:4px;-webkit-flex-wrap:wrap;flex-wrap:wrap;margin-top:3px;padding-left:26px}
.tag{font-size:9px;padding:2px 7px;border-radius:20px;letter-spacing:.5px;font-family:‘Cinzel’,serif}
.tag.bid{background:rgba(100,10,10,.28);color:rgba(255,130,110,.78);border:1px solid rgba(100,10,10,.28)}
.tag.dbl{background:rgba(170,130,35,.12);color:rgba(215,185,70,.72);border:1px solid rgba(170,130,35,.20)}
.tag.rdbl{background:rgba(170,35,25,.12);color:rgba(215,70,55,.78);border:1px solid rgba(170,35,25,.20)}
.tag.hkm{background:rgba(12,65,32,.24);color:rgba(65,185,105,.78);border:1px solid rgba(12,65,32,.32)}
/* Empty state */
.empty{text-align:center;padding:22px 0;color:rgba(201,168,76,.17);font-size:11px;letter-spacing:1px}
.empty-ic{font-size:28px;display:block;margin-bottom:6px;opacity:.3}

/* ─── WINNER MODAL ─── */
.overlay{
position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;
display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;
opacity:0;pointer-events:none;
-webkit-transition:opacity .35s;transition:opacity .35s;
-webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);
}
.overlay.show{opacity:1;pointer-events:all}
.wcard{
background:linear-gradient(160deg,#1c1206 0%,#0c180d 100%);
border:1px solid var(–gold);border-radius:20px;
padding:34px 28px 28px;text-align:center;
width:min(300px,84vw);
box-shadow:0 0 60px rgba(201,168,76,.18),0 20px 60px rgba(0,0,0,.6);
-webkit-transform:scale(.88);transform:scale(.88);
-webkit-transition:-webkit-transform .4s cubic-bezier(.34,1.56,.64,1);transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
.overlay.show .wcard{-webkit-transform:scale(1);transform:scale(1)}
.wsuits{font-size:26px;letter-spacing:10px;margin-bottom:12px}
.wlbl{font-size:9px;color:rgba(201,168,76,.42);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
.wname{font-family:‘Cinzel Decorative’,serif;font-size:26px;color:var(–gold2);margin-bottom:8px;word-break:break-word}
.wscore{font-family:‘Amiri’,serif;font-size:16px;color:rgba(201,168,76,.48);margin-bottom:22px}
.ng-btn{
background:linear-gradient(135deg,#c9a84c,rgba(201,168,76,.72));
border:none;border-radius:11px;color:#1a1209;
font-family:‘Cinzel’,serif;font-size:13px;font-weight:600;
letter-spacing:2px;text-transform:uppercase;padding:13px 32px;
cursor:pointer;-webkit-appearance:none;appearance:none;
}
.ng-btn:active{opacity:.82}

/* ─── TOAST ─── */
.toast{
position:fixed;bottom:calc(24px + var(–sb));left:50%;
-webkit-transform:translateX(-50%) translateY(70px);transform:translateX(-50%) translateY(70px);
background:rgba(18,14,8,.93);border:1px solid rgba(201,168,76,.32);
border-radius:20px;padding:10px 20px;color:var(–gold2);
font-size:12px;letter-spacing:1px;z-index:1000;white-space:nowrap;
-webkit-transition:-webkit-transform .32s cubic-bezier(.34,1.56,.64,1);transition:transform .32s cubic-bezier(.34,1.56,.64,1);
-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.toast.show{-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0)}

/* ─── FLASH ANIMATION ─── */
@-webkit-keyframes flash{0%,100%{-webkit-transform:scale(1)}45%{-webkit-transform:scale(1.14)}}
@keyframes flash{0%,100%{transform:scale(1)}45%{transform:scale(1.14)}}
.flash{display:inline-block;-webkit-animation:flash .36s ease;animation:flash .36s ease}

/* ─── CONFETTI ─── */
.cfp{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:998}
@-webkit-keyframes cf{from{opacity:1;-webkit-transform:translateY(-20px) rotate(0deg)}to{opacity:0;-webkit-transform:translateY(110vh) rotate(720deg)}}
@keyframes cf{from{opacity:1;transform:translateY(-20px) rotate(0deg)}to{opacity:0;transform:translateY(110vh) rotate(720deg)}}
</style>

</head>

  <!-- HISTORY -->

  <div class="hist-sec">
    <div class="div"><div class="div-line"></div><span class="div-txt">History</span><div class="div-line"></div></div>

<!-- WINNER MODAL -->

<div class="overlay" id="ov">
  <div class="wcard">
    <div class="wsuits">&#9824; &#9829;</div>
    <div class="wlbl">Winner</div>
    <div class="wname" id="wn">—</div>
    <div class="wscore" id="ws"></div>
    <button class="ng-btn" onclick="resetGame()">New Game</button>
  </div>
</div>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<script>
/* ── State ── */
var G={s1:0,s2:0,w1:0,w2:0,rounds:[],d:false,r:false,h:false};

/* ── Helpers ── */
function el(id){return document.getElementById(id)}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ── Name sync ── */
function syncNames(){
  var t1=el('n1').value||'Team 1', t2=el('n2').value||'Team 2';
  el('l1').textContent=t1; el('l2').textContent=t2;
  el('pn1').textContent=t1; el('pn2').textContent=t2;
  el('bid').options[1].text=t1+' — Bid';
  el('bid').options[2].text=t2+' — Bid';
}
el('n1').addEventListener('input',syncNames);
el('n2').addEventListener('input',syncNames);
el('tgt').addEventListener('input',updateProg);
syncNames();

/* ── Toggles ── */
function tog(k){
  if(k==='d'){G.d=!G.d;if(G.d)G.r=false}
  else if(k==='r'){G.r=!G.r;if(G.r)G.d=false}
  else{G.h=!G.h}
  el('bD').className='tog'+(G.d?' on':'');
  el('bR').className='tog'+(G.r?' on':'');
  el('bH').className='tog'+(G.h?' on':'');
}

/* ── Add Round ── */
function addRound(){
  var r1=parseInt(el('i1').value)||0;
  var r2=parseInt(el('i2').value)||0;
  var bid=el('bid').value;
  if(!r1&&!r2){toast('Enter scores first');return}
  var p1=r1,p2=r2;
  var m=G.r?4:G.d?2:1;
  if(G.h){if(p1>p2)p1+=30;else if(p2>p1)p2+=30}
  if(bid){
    var bs=bid==='1'?p1:p2;
    if(bs<77){
      if(bid==='1'){p2+=p1;p1=0}else{p1+=p2;p2=0}
      toast('Bid failed! Opponent wins all');
    }
  }
  p1=Math.round(p1*m); p2=Math.round(p2*m);
  G.s1+=p1; G.s2+=p2;
  if(p1>p2)G.w1++; else if(p2>p1)G.w2++;
  var tags=[];
  if(bid)tags.push({c:'bid',l:'BID'});
  if(G.d)tags.push({c:'dbl',l:'×2'});
  if(G.r)tags.push({c:'rdbl',l:'×4'});
  if(G.h)tags.push({c:'hkm',l:'HOKM'});
  G.rounds.push({p1:p1,p2:p2,tags:tags});
  el('i1').value='';el('i2').value='';
  el('bid').value='';G.d=false;G.r=false;G.h=false;
  el('bD').className='tog';el('bR').className='tog';el('bH').className='tog';
  el('i1').placeholder='0';el('i2').placeholder='0';
  render();
  if(!checkWin())toast('Round added!');
}

/* ── Render ── */
function render(){
  flash('s1',G.s1); flash('s2',G.s2);
  el('w1').textContent=G.w1; el('w2').textContent=G.w2;
  el('c1').className='tcard'+(G.s1>G.s2?' win':'');
  el('c2').className='tcard'+(G.s2>G.s1?' win':'');
  updateProg(); renderList();
}

function flash(id,val){
  var e=el(id); e.textContent=val;
  e.className='tscore'; void e.offsetWidth; e.className='tscore flash';
}

function updateProg(){
  var tgt=parseInt(el('tgt').value)||152;
  el('pb1').style.width=Math.min(100,(G.s1/tgt)*100)+'%';
  el('pb2').style.width=Math.min(100,(G.s2/tgt)*100)+'%';
  el('pv1').textContent=G.s1; el('pv2').textContent=G.s2;
}

function renderList(){
  var list=el('rl');
  if(!G.rounds.length){
    list.innerHTML='<div class="empty"><span class="empty-ic">&#127137;</span>No rounds yet — start the game!</div>';
    return;
  }
  var t1=esc(el('n1').value||'T1'), t2=esc(el('n2').value||'T2');
  list.innerHTML=G.rounds.map(function(r,i){
    var tg=r.tags.map(function(t){return'<span class="tag '+t.c+'">'+t.l+'</span>'}).join('');
    return'<div class="rrow">'+
      '<div class="rn">'+(i+1)+'</div>'+
      '<div class="rt">'+t1+'</div>'+
      '<div class="rp g">'+r.p1+'</div>'+
      '<div class="rsep">|</div>'+
      '<div class="rp r">'+r.p2+'</div>'+
      '<div class="rt">'+t2+'</div>'+
      '<button class="rdel" onclick="delRound('+i+')">&#10005;</button>'+
      (tg?'<div class="rtags">'+tg+'</div>':'')+
    '</div>';
  }).reverse().join('');
}

function delRound(i){
  var r=G.rounds[i];
  G.s1-=r.p1;G.s2-=r.p2;
  if(r.p1>r.p2)G.w1=Math.max(0,G.w1-1);
  else if(r.p2>r.p1)G.w2=Math.max(0,G.w2-1);
  G.rounds.splice(i,1);render();toast('Round removed');
}

function clearAll(){
  if(!G.rounds.length)return;
  G.rounds=[];G.s1=0;G.s2=0;G.w1=0;G.w2=0;
  render();toast('History cleared');
}

/* ── Winner ── */
function checkWin(){
  var tgt=parseInt(el('tgt').value)||152,winner=0;
  if(G.s1>=tgt&&G.s1>=G.s2)winner=1;
  else if(G.s2>=tgt&&G.s2>G.s1)winner=2;
  if(!winner)return false;
  el('wn').textContent=winner===1?(el('n1').value||'Team 1'):(el('n2').value||'Team 2');
  el('ws').textContent=G.s1+' — '+G.s2;
  el('ov').className='overlay show';
  confetti();return true;
}

/* ── Reset ── */
function resetGame(){
  G={s1:0,s2:0,w1:0,w2:0,rounds:[],d:false,r:false,h:false};
  el('ov').className='overlay';
  el('i1').value='';el('i2').value='';el('bid').value='';
  el('bD').className='tog';el('bR').className='tog';el('bH').className='tog';
  render();toast('New game!');
}

/* ── Auto-hint ── */
el('i1').addEventListener('input',function(){
  var v=parseInt(this.value);
  el('i2').placeholder=(!isNaN(v)&&v>=0)?Math.max(0,152-v):'0';
});
el('i2').addEventListener('input',function(){
  var v=parseInt(this.value);
  el('i1').placeholder=(!isNaN(v)&&v>=0)?Math.max(0,152-v):'0';
});

/* ── Toast ── */
var tt;
function toast(msg){
  var e=el('toast');e.textContent=msg;e.className='toast show';
  clearTimeout(tt);tt=setTimeout(function(){e.className='toast'},2100);
}

/* ── Confetti ── */
function confetti(){
  var cols=['#c9a84c','#e8c96a','#b83227','#d94535','#f0e2c4','#fff'];
  for(var i=0;i<40;i++){
    (function(d){
      setTimeout(function(){
        var e=document.createElement('div');
        e.className='cfp';
        e.style.left=(Math.random()*100)+'vw';
        e.style.background=cols[Math.floor(Math.random()*cols.length)];
        var dur=(1.6+Math.random()*2).toFixed(2)+'s';
        e.style.cssText+=';-webkit-animation:cf '+dur+' linear forwards;animation:cf '+dur+' linear forwards;';
        document.body.appendChild(e);
        setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e)},4000);
      },d);
    })(i*55);
  }
}

/* Init */
render();
</script>

</body>
</html>
