<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Balot">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A1410">
<title>بالوت | Balot</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>

- {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  }

:root {
–bg:       #1A1410;
–surface:  #231E17;
–raised:   #2C261D;
–border:   #4A3E28;
–bhi:      #C49A2A;
–gold:     #D4A843;
–goldhi:   #F0C85A;
–red:      #C43525;
–redhi:    #E85040;
–t1:       #E8B840;
–t2:       #E84835;
–tx1:      #F2E4C4;
–tx2:      #A89060;
–tx3:      #5A4A30;
}

html {
background-color: #1A1410;
/* Prevent Safari from adding any white */
-webkit-text-size-adjust: 100%;
}
body {
background-color: #1A1410;
font-family: ‘Cinzel’, serif;
color: #F2E4C4;
-webkit-font-smoothing: antialiased;
overscroll-behavior-y: none;
/* Full height without overflow tricks that break Safari */
min-height: 100vh;
display: flex;
justify-content: center;
}

#app {
width: 100%;
max-width: 430px;
background-color: #1A1410;
/* Bottom padding accounts for Safari’s browser toolbar (~83px) + extra */
padding-bottom: 110px;
}

/* ─── HEADER ─── */
.hdr {
background-color: #231E17;
border-bottom: 2px solid #4A3E28;
/* Top padding accounts for the status bar notch */
padding: env(safe-area-inset-top, 20px) 20px 18px;
padding-top: max(env(safe-area-inset-top, 0px), 20px);
text-align: center;
}
.suits-row {
display: flex;
justify-content: center;
gap: 14px;
font-size: 18px;
margin-bottom: 8px;
}
.s-black { color: #D0C8B8; }
.s-red   { color: #E85040; }

.hdr-title {
font-family: ‘Cinzel Decorative’, serif;
font-size: 30px;
letter-spacing: 6px;
color: #D4A843;
line-height: 1.1;
}
.hdr-sub {
font-family: ‘Amiri’, serif;
font-size: 14px;
color: #A89060;
letter-spacing: 2px;
margin-top: 4px;
}

/* ─── SETTINGS ─── */
.settings {
display: flex;
gap: 10px;
padding: 14px 14px 0;
align-items: stretch;
}
.tgt-box {
flex: 1;
display: flex;
align-items: center;
gap: 10px;
background-color: #231E17;
border: 2px solid #4A3E28;
border-radius: 12px;
padding: 12px 14px;
min-width: 0;
}
.tgt-lbl {
font-size: 11px;
color: #A89060;
letter-spacing: 1.5px;
text-transform: uppercase;
white-space: nowrap;
flex-shrink: 0;
}
.tgt-input {
flex: 1;
background: transparent;
border: none;
outline: none;
color: #D4A843;
font-family: ‘Cinzel’, serif;
font-size: 18px;
font-weight: 600;
text-align: right;
/* Fixed width prevents layout shift */
width: 60px;
min-width: 0;
-webkit-appearance: none;
-moz-appearance: textfield;
appearance: none;
}
.tgt-input::-webkit-inner-spin-button,
.tgt-input::-webkit-outer-spin-button { display: none; }

.reset-btn {
background-color: #3A1810;
border: 2px solid #7A2818;
border-radius: 12px;
color: #E85040;
font-family: ‘Cinzel’, serif;
font-size: 12px;
letter-spacing: 1px;
padding: 12px 16px;
cursor: pointer;
white-space: nowrap;
flex-shrink: 0;
-webkit-appearance: none;
appearance: none;
}
.reset-btn:active { background-color: #4A1E12; }

/* ─── SCOREBOARD ─── */
.scoreboard {
display: flex;
gap: 12px;
padding: 14px 14px 0;
}
.tcard {
/* Explicit width — each card takes exactly half minus gap */
flex: 1;
width: 0; /* flex children don’t overflow */
min-width: 0;
background-color: #231E17;
border: 2px solid #4A3E28;
border-radius: 14px;
padding: 16px 12px 14px;
text-align: center;
position: relative;
overflow: hidden;
transition: border-color 0.25s;
-webkit-transition: border-color 0.25s;
}
.tcard::after {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
}
#c1::after { background-color: #D4A843; }
#c2::after { background-color: #C43525; }
.tcard.win { border-color: #C49A2A; }

.tname {
font-family: ‘Amiri’, serif;
font-size: 16px;
font-weight: 700;
color: #F2E4C4;
background: transparent;
border: none;
border-bottom: 1.5px solid #4A3E28;
text-align: center;
/* Explicit width so it doesn’t overflow the card */
width: 100%;
max-width: 100%;
outline: none;
padding: 2px 4px 4px;
margin-bottom: 12px;
display: block;
-webkit-appearance: none;
appearance: none;
}
.tname::placeholder { color: #5A4A30; }
.tname:focus { border-bottom-color: #C49A2A; }

.tscore {
font-family: ‘Cinzel Decorative’, serif;
font-size: 52px;
line-height: 1;
display: inline-block;
}
#c1 .tscore { color: #E8B840; }
#c2 .tscore { color: #E84835; }

.twins {
margin-top: 8px;
font-size: 10px;
color: #5A4A30;
letter-spacing: 1px;
text-transform: uppercase;
}
.twins b { color: #A89060; }

/* ─── PROGRESS ─── */
.prog-sec { padding: 12px 14px 0; }
.prog-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 7px;
}
.prog-name {
font-size: 11px;
color: #A89060;
min-width: 56px;
max-width: 72px;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
flex-shrink: 0;
}
.prog-track {
flex: 1;
height: 7px;
background-color: #2C261D;
border-radius: 10px;
overflow: hidden;
border: 1px solid #3A3020;
min-width: 0;
}
.prog-fill {
height: 100%;
border-radius: 10px;
width: 0%;
transition: width 0.5s ease;
-webkit-transition: width 0.5s ease;
}
.f1 { background-color: #D4A843; }
.f2 { background-color: #C43525; }
.prog-val {
font-size: 12px;
font-weight: 600;
width: 32px;
text-align: right;
flex-shrink: 0;
}
.v1 { color: #E8B840; }
.v2 { color: #E84835; }

/* ─── DIVIDER ─── */
.sec-div {
display: flex;
align-items: center;
gap: 10px;
padding: 18px 14px 10px;
}
.sec-line {
flex: 1;
height: 1px;
background-color: #4A3E28;
}
.sec-txt {
font-size: 9px;
color: #5A4A30;
letter-spacing: 2.5px;
text-transform: uppercase;
white-space: nowrap;
}

/* ─── ENTRY ─── */
.entry-sec {
padding: 0 14px;
overflow: hidden;
/* Establish a block formatting context so children respect this width */
display: block;
}

.entry-grid {
/* Use CSS Grid — columns are guaranteed equal and gap is internal */
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-bottom: 12px;
/* 100% of the padded parent — no viewport bleed */
width: 100%;
box-sizing: border-box;
}
.eg {
/* Grid cell — no explicit width needed, grid handles it */
min-width: 0;
display: flex;
flex-direction: column;
gap: 6px;
overflow: hidden;
}
.elbl {
font-size: 10px;
color: #A89060;
letter-spacing: 1.5px;
text-transform: uppercase;
text-align: center;
display: block;
}

/* Score inputs */
.einput {
background-color: #231E17;
border: 2px solid #4A3E28;
border-radius: 12px;
font-family: ‘Cinzel’, serif;
font-size: 34px;
font-weight: 600;
text-align: center;
padding: 14px 0;
outline: none;
/* Fill the grid cell exactly — box-sizing handles border */
width: 100%;
min-width: 0;
max-width: 100%;
display: block;
box-sizing: border-box;
-webkit-appearance: none;
-moz-appearance: textfield;
appearance: none;
transition: border-color 0.2s, background-color 0.2s;
-webkit-transition: border-color 0.2s, background-color 0.2s;
}
.einput::-webkit-inner-spin-button,
.einput::-webkit-outer-spin-button { display: none; }

#i1 { color: #E8B840; border-color: #6A5020; }
#i2 { color: #E84835; border-color: #6A2418; }
#i1::placeholder { color: #5A4010; }
#i2::placeholder { color: #5A2010; }
#i1:focus { border-color: #D4A843; background-color: #2C261D; color: #F5D060; }
#i2:focus { border-color: #C43525; background-color: #2C1A14; color: #FF6050; }

/* BID BOX */
.bid-box {
background-color: #231E17;
border: 2px solid #4A3E28;
border-radius: 12px;
padding: 12px 14px;
margin-bottom: 12px;
}
.bid-lbl {
font-size: 10px;
color: #A89060;
letter-spacing: 1.5px;
text-transform: uppercase;
margin-bottom: 8px;
}
.sel-wrap { position: relative; }
.sel-wrap::after {
content: ‘▾’;
position: absolute;
right: 14px;
top: 50%;
transform: translateY(-50%);
-webkit-transform: translateY(-50%);
color: #A89060;
font-size: 14px;
pointer-events: none;
line-height: 1;
}
.bid-sel {
width: 100%;
background-color: #2C261D;
border: 2px solid #4A3E28;
border-radius: 10px;
color: #F2E4C4;
font-family: ‘Cinzel’, serif;
font-size: 16px;
padding: 12px 38px 12px 14px;
outline: none;
cursor: pointer;
-webkit-appearance: none;
-moz-appearance: none;
appearance: none;
display: block;
}
.bid-sel::-ms-expand { display: none; }
.bid-sel option { background-color: #231E17; color: #F2E4C4; }

/* TOGGLES */
.toggles {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 10px;
margin-bottom: 12px;
width: 100%;
box-sizing: border-box;
}
.tog {
min-width: 0;
overflow: hidden;
background-color: #231E17;
border: 2px solid #4A3E28;
border-radius: 12px;
color: #A89060;
font-family: ‘Cinzel’, serif;
font-size: 10px;
letter-spacing: 0.5px;
padding: 11px 4px 9px;
cursor: pointer;
text-align: center;
line-height: 1.5;
-webkit-appearance: none;
appearance: none;
display: block;
width: 100%;
box-sizing: border-box;
transition: background-color 0.18s, border-color 0.18s, color 0.18s;
-webkit-transition: background-color 0.18s, border-color 0.18s, color 0.18s;
}
.tog-icon {
font-size: 16px;
display: block;
margin-bottom: 3px;
color: #5A4A30;
}
.tog.on {
background-color: #2C2210;
border-color: #C49A2A;
color: #F0C85A;
}
.tog.on .tog-icon { color: #D4A843; }
.tog:active { opacity: 0.72; }

/* ADD BUTTON */
.add-btn {
width: 100%;
background-color: #D4A843;
border: none;
border-radius: 14px;
color: #1A1410;
font-family: ‘Cinzel’, serif;
font-size: 15px;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
padding: 17px;
cursor: pointer;
-webkit-appearance: none;
appearance: none;
display: block;
transition: background-color 0.18s, transform 0.12s;
-webkit-transition: background-color 0.18s, -webkit-transform 0.12s;
}
.add-btn:active {
background-color: #F0C85A;
transform: scale(0.98);
-webkit-transform: scale(0.98);
}

/* ─── HISTORY ─── */
.hist-sec { padding: 0 14px; }
.hist-hdr {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 10px;
}
.hist-ttl {
font-size: 10px;
color: #5A4A30;
letter-spacing: 2px;
text-transform: uppercase;
}
.clr-btn {
font-family: ‘Cinzel’, serif;
font-size: 10px;
letter-spacing: 1px;
color: #E85040;
background-color: #3A1810;
border: 1.5px solid #7A2818;
border-radius: 8px;
padding: 6px 12px;
cursor: pointer;
-webkit-appearance: none;
appearance: none;
}
.clr-btn:active { background-color: #4A1E12; }

.rlist {
display: flex;
flex-direction: column;
gap: 8px;
max-height: 280px;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
overscroll-behavior: contain;
}
.rlist::-webkit-scrollbar { width: 3px; }
.rlist::-webkit-scrollbar-track { background: transparent; }
.rlist::-webkit-scrollbar-thumb { background-color: #4A3E28; border-radius: 10px; }

.rrow {
background-color: #231E17;
border: 1.5px solid #3A3020;
border-radius: 12px;
padding: 11px 12px;
display: flex;
align-items: center;
gap: 8px;
flex-wrap: wrap;
animation: sIn 0.22s ease;
-webkit-animation: sIn 0.22s ease;
}
@keyframes sIn {
from { opacity: 0; transform: translateY(-5px); }
to   { opacity: 1; transform: translateY(0); }
}
@-webkit-keyframes sIn {
from { opacity: 0; -webkit-transform: translateY(-5px); }
to   { opacity: 1; -webkit-transform: translateY(0); }
}
.rn {
font-size: 10px; color: #5A4A30;
border: 1px solid #3A3020; border-radius: 50%;
width: 22px; height: 22px;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
.rt {
flex: 1; min-width: 0;
font-size: 10px; color: #A89060;
text-align: center;
overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rp {
font-family: ‘Cinzel Decorative’, serif;
font-size: 18px; font-weight: 700;
width: 38px; text-align: center;
flex-shrink: 0;
}
.rp.g { color: #E8B840; }
.rp.r { color: #E84835; }
.rsep { font-size: 12px; color: #3A3020; flex-shrink: 0; }
.rdel {
background: none; border: none;
color: #7A3020; font-size: 14px;
padding: 3px 5px; cursor: pointer;
-webkit-appearance: none; appearance: none;
flex-shrink: 0; line-height: 1;
}
.rdel:active { color: #E85040; }
.rtags {
width: 100%;
display: flex; gap: 5px; flex-wrap: wrap;
margin-top: 4px; padding-left: 30px;
}
.tag {
font-size: 9px; padding: 3px 8px; border-radius: 20px;
letter-spacing: 0.5px; font-family: ‘Cinzel’, serif; font-weight: 600;
}
.tag.bid  { background-color: #3A1410; color: #F09080; border: 1px solid #7A2818; }
.tag.dbl  { background-color: #2C2210; color: #F5D060; border: 1px solid #6A5020; }
.tag.rdbl { background-color: #3A1410; color: #F08070; border: 1px solid #7A2818; }
.tag.hkm  { background-color: #102818; color: #60D890; border: 1px solid #1E6030; }

.empty {
text-align: center; padding: 28px 0;
color: #5A4A30; font-size: 12px; letter-spacing: 1px;
}
.empty-ic { font-size: 32px; display: block; margin-bottom: 8px; }

/* ─── WINNER MODAL ─── */
.overlay {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background-color: rgba(0,0,0,0.88);
z-index: 900;
display: flex;
align-items: center;
justify-content: center;
opacity: 0;
pointer-events: none;
transition: opacity 0.35s;
-webkit-transition: opacity 0.35s;
-webkit-backdrop-filter: blur(6px);
backdrop-filter: blur(6px);
}
.overlay.show { opacity: 1; pointer-events: all; }
.wcard {
background-color: #231E17;
border: 2px solid #C49A2A;
border-radius: 22px;
padding: 36px 28px 30px;
text-align: center;
width: 86vw;
max-width: 310px;
transform: scale(0.88);
-webkit-transform: scale(0.88);
transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
-webkit-transition: -webkit-transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.overlay.show .wcard {
transform: scale(1);
-webkit-transform: scale(1);
}
.wsuits { font-size: 28px; letter-spacing: 12px; margin-bottom: 14px; color: #D4A843; }
.wlbl   { font-size: 10px; color: #A89060; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; }
.wname  { font-family: ‘Cinzel Decorative’, serif; font-size: 28px; color: #D4A843; margin-bottom: 10px; word-break: break-word; }
.wscore { font-family: ‘Amiri’, serif; font-size: 18px; color: #A89060; margin-bottom: 26px; }
.ng-btn {
background-color: #D4A843; border: none; border-radius: 12px;
color: #1A1410; font-family: ‘Cinzel’, serif;
font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
padding: 14px 36px; cursor: pointer;
-webkit-appearance: none; appearance: none;
}
.ng-btn:active { opacity: 0.85; }

/* ─── TOAST ───
KEY FIX: position relative to the app, not fixed to viewport.
Safari’s browser toolbar overlaps fixed-bottom elements.
We use a sticky-like approach inside the scroll flow instead.
The toast is injected at the end of #app and shown/hidden via opacity+transform.
It sits ABOVE the bottom padding we already set (110px).
─────────────────────────────────────────── */
.toast {
/* Fixed to viewport center-bottom but offset above Safari toolbar */
position: fixed;
/* 100px clears Safari’s bottom toolbar reliably on all iPhones */
bottom: max(100px, calc(60px + env(safe-area-inset-bottom, 0px)));
left: 50%;
transform: translateX(-50%) translateY(20px);
-webkit-transform: translateX(-50%) translateY(20px);
opacity: 0;
background-color: #2C261D;
border: 2px solid #C49A2A;
border-radius: 24px;
padding: 12px 24px;
/* Ensure text is ALWAYS visible */
color: #F2E4C4;
font-family: ‘Cinzel’, serif;
font-size: 13px;
letter-spacing: 0.5px;
white-space: nowrap;
/* Above modal */
z-index: 1000;
pointer-events: none;
transition: opacity 0.25s ease, transform 0.25s ease;
-webkit-transition: opacity 0.25s ease, -webkit-transform 0.25s ease;
/* Prevent it from stretching */
max-width: calc(100vw - 40px);
}
.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
-webkit-transform: translateX(-50%) translateY(0);
}

/* Score flash */
@keyframes flash {
0%,100% { transform: scale(1); }
40%      { transform: scale(1.12); }
}
@-webkit-keyframes flash {
0%,100% { -webkit-transform: scale(1); }
40%      { -webkit-transform: scale(1.12); }
}
.flash {
display: inline-block;
animation: flash 0.35s ease;
-webkit-animation: flash 0.35s ease;
}

/* Confetti */
.cfp {
position: fixed;
width: 8px; height: 8px;
border-radius: 2px;
pointer-events: none;
z-index: 800;
}
@keyframes cf {
from { opacity: 1; transform: translateY(-20px) rotate(0deg); }
to   { opacity: 0; transform: translateY(110vh) rotate(720deg); }
}
@-webkit-keyframes cf {
from { opacity: 1; -webkit-transform: translateY(-20px) rotate(0deg); }
to   { opacity: 0; -webkit-transform: translateY(110vh) rotate(720deg); }
}

</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->

  <div class="hdr">
    <div class="suits-row">
      <span class="s-black">♠</span>
      <span class="s-red">♥</span>
      <span class="s-red">♦</span>
      <span class="s-black">♣</span>
    </div>
    <div class="hdr-title">BALOT</div>
    <div class="hdr-sub">حاسبة البالوت</div>
  </div>

  <!-- SETTINGS -->

  <div class="settings">
    <div class="tgt-box">
      <span class="tgt-lbl">Target</span>
      <input class="tgt-input" id="tgt" type="number"
             inputmode="numeric" pattern="[0-9]*"
             autocomplete="off" autocorrect="off" spellcheck="false"
             value="152" min="50" max="999">
    </div>
    <button class="reset-btn" onclick="resetGame()">↺ Reset</button>
  </div>

  <!-- SCOREBOARD -->

  <div class="scoreboard">
    <div class="tcard" id="c1">
      <input class="tname" id="n1" value="فريق ١" placeholder="Team 1"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="tscore" id="s1">0</div>
      <div class="twins">Rounds: <b id="w1">0</b></div>
    </div>
    <div class="tcard" id="c2">
      <input class="tname" id="n2" value="فريق ٢" placeholder="Team 2"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="tscore" id="s2">0</div>
      <div class="twins">Rounds: <b id="w2">0</b></div>
    </div>
  </div>

  <!-- PROGRESS -->

  <div class="prog-sec">
    <div class="prog-row">
      <span class="prog-name" id="pn1">فريق ١</span>
      <div class="prog-track"><div class="prog-fill f1" id="pb1"></div></div>
      <span class="prog-val v1" id="pv1">0</span>
    </div>
    <div class="prog-row">
      <span class="prog-name" id="pn2">فريق ٢</span>
      <div class="prog-track"><div class="prog-fill f2" id="pb2"></div></div>
      <span class="prog-val v2" id="pv2">0</span>
    </div>
  </div>

  <!-- DIVIDER -->

  <div class="sec-div">
    <div class="sec-line"></div>
    <span class="sec-txt">New Round</span>
    <div class="sec-line"></div>

<!-- WINNER MODAL -->

<div class="overlay" id="ov">
  <div class="wcard">
    <div class="wsuits">♠ ♥</div>
    <div class="wlbl">Winner</div>
    <div class="wname" id="wn">—</div>

  </div>

<!-- TOAST — outside #app so it's always on top -->

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
var G = { s1:0, s2:0, w1:0, w2:0, rounds:[], d:false, r:false, h:false };

function el(id) { return document.getElementById(id); }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ── Names ── */
function syncNames() {
  var t1 = el('n1').value || 'Team 1';
  var t2 = el('n2').value || 'Team 2';
  el('l1').textContent = t1;
  el('l2').textContent = t2;
  el('pn1').textContent = t1;
  el('pn2').textContent = t2;
  el('bid').options[1].text = t1 + ' — Bid';
  el('bid').options[2].text = t2 + ' — Bid';
}
el('n1').addEventListener('input', syncNames);
el('n2').addEventListener('input', syncNames);
el('tgt').addEventListener('input', updateProg);
syncNames();

/* ── Toggles ── */
function tog(k) {
  if (k === 'd') { G.d = !G.d; if (G.d) G.r = false; }
  else if (k === 'r') { G.r = !G.r; if (G.r) G.d = false; }
  else { G.h = !G.h; }
  el('bD').className = 'tog' + (G.d ? ' on' : '');
  el('bR').className = 'tog' + (G.r ? ' on' : '');
  el('bH').className = 'tog' + (G.h ? ' on' : '');
}

/* ── Add Round ── */
function addRound() {
  var r1 = parseInt(el('i1').value) || 0;
  var r2 = parseInt(el('i2').value) || 0;
  var bid = el('bid').value;
  if (!r1 && !r2) { showToast('Enter scores first'); return; }
  var p1 = r1, p2 = r2, m = G.r ? 4 : G.d ? 2 : 1;
  if (G.h) { if (p1 > p2) p1 += 30; else if (p2 > p1) p2 += 30; }
  if (bid) {
    var bs = bid === '1' ? p1 : p2;
    if (bs < 77) {
      if (bid === '1') { p2 += p1; p1 = 0; }
      else             { p1 += p2; p2 = 0; }
      showToast('Bid failed! Opponent takes all');
    }
  }
  p1 = Math.round(p1 * m);
  p2 = Math.round(p2 * m);
  G.s1 += p1; G.s2 += p2;
  if (p1 > p2) G.w1++; else if (p2 > p1) G.w2++;
  var tags = [];
  if (bid) tags.push({ c: 'bid',  l: 'BID' });
  if (G.d) tags.push({ c: 'dbl',  l: '×2' });
  if (G.r) tags.push({ c: 'rdbl', l: '×4' });
  if (G.h) tags.push({ c: 'hkm',  l: 'HOKM' });
  G.rounds.push({ p1: p1, p2: p2, tags: tags });
  /* Reset inputs */
  el('i1').value = ''; el('i2').value = '';
  el('bid').value = '';
  G.d = false; G.r = false; G.h = false;
  el('bD').className = 'tog';
  el('bR').className = 'tog';
  el('bH').className = 'tog';
  el('i1').placeholder = '0';
  el('i2').placeholder = '0';
  render();
  if (!checkWin()) showToast('Round added!');
}

/* ── Render ── */
function render() {
  flashScore('s1', G.s1);
  flashScore('s2', G.s2);
  el('w1').textContent = G.w1;
  el('w2').textContent = G.w2;
  el('c1').className = 'tcard' + (G.s1 > G.s2 ? ' win' : '');
  el('c2').className = 'tcard' + (G.s2 > G.s1 ? ' win' : '');
  updateProg();
  renderList();
}

function flashScore(id, val) {
  var e = el(id);
  e.textContent = val;
  e.className = 'tscore';
  void e.offsetWidth;
  e.className = 'tscore flash';
}

function updateProg() {
  var tgt = parseInt(el('tgt').value) || 152;
  el('pb1').style.width = Math.min(100, (G.s1 / tgt) * 100) + '%';
  el('pb2').style.width = Math.min(100, (G.s2 / tgt) * 100) + '%';
  el('pv1').textContent = G.s1;
  el('pv2').textContent = G.s2;
}

function renderList() {
  var list = el('rl');
  if (!G.rounds.length) {
    list.innerHTML = '<div class="empty"><span class="empty-ic">🃏</span>No rounds yet — start the game!</div>';
    return;
  }
  var t1 = esc(el('n1').value || 'T1');
  var t2 = esc(el('n2').value || 'T2');
  list.innerHTML = G.rounds.map(function(r, i) {
    var tg = r.tags.map(function(t) {
      return '<span class="tag ' + t.c + '">' + t.l + '</span>';
    }).join('');
    return '<div class="rrow">' +
      '<div class="rn">' + (i + 1) + '</div>' +
      '<div class="rt">' + t1 + '</div>' +
      '<div class="rp g">' + r.p1 + '</div>' +
      '<div class="rsep">|</div>' +
      '<div class="rp r">' + r.p2 + '</div>' +
      '<div class="rt">' + t2 + '</div>' +
      '<button class="rdel" onclick="delRound(' + i + ')">✕</button>' +
      (tg ? '<div class="rtags">' + tg + '</div>' : '') +
    '</div>';
  }).reverse().join('');
}

function delRound(i) {
  var r = G.rounds[i];
  G.s1 -= r.p1; G.s2 -= r.p2;
  if (r.p1 > r.p2) G.w1 = Math.max(0, G.w1 - 1);
  else if (r.p2 > r.p1) G.w2 = Math.max(0, G.w2 - 1);
  G.rounds.splice(i, 1);
  render();
  showToast('Round removed');
}

function clearAll() {
  if (!G.rounds.length) return;
  G.rounds = []; G.s1 = 0; G.s2 = 0; G.w1 = 0; G.w2 = 0;
  render();
  showToast('Cleared');
}

/* ── Winner ── */
function checkWin() {
  var tgt = parseInt(el('tgt').value) || 152, w = 0;
  if (G.s1 >= tgt && G.s1 >= G.s2) w = 1;
  else if (G.s2 >= tgt && G.s2 > G.s1) w = 2;
  if (!w) return false;
  el('wn').textContent = w === 1
    ? (el('n1').value || 'Team 1')
    : (el('n2').value || 'Team 2');
  el('ws').textContent = G.s1 + ' — ' + G.s2;
  el('ov').className = 'overlay show';
  launchConfetti();
  return true;
}

/* ── Reset ── */
function resetGame() {
  G = { s1:0, s2:0, w1:0, w2:0, rounds:[], d:false, r:false, h:false };
  el('ov').className = 'overlay';
  el('i1').value = ''; el('i2').value = '';
  el('bid').value = '';
  el('bD').className = 'tog';
  el('bR').className = 'tog';
  el('bH').className = 'tog';
  render();
  showToast('New game started!');
}

/* ── Auto-hint ── */
el('i1').addEventListener('input', function() {
  var v = parseInt(this.value);
  el('i2').placeholder = (!isNaN(v) && v >= 0) ? Math.max(0, 152 - v) : '0';
});
el('i2').addEventListener('input', function() {
  var v = parseInt(this.value);
  el('i1').placeholder = (!isNaN(v) && v >= 0) ? Math.max(0, 152 - v) : '0';
});

/* ── Dismiss keyboard on background tap ── */
document.addEventListener('touchstart', function(e) {
  if (!e.target.closest('input') && !e.target.closest('select') && !e.target.closest('button')) {
    if (document.activeElement && document.activeElement.blur) {
      document.activeElement.blur();
    }
  }
});

/* ── Toast ── */
var tt;
function showToast(msg) {
  var e = el('toast');
  /* Clear and re-set to force repaint — fixes Safari empty-toast bug */
  e.className = 'toast';
  e.textContent = '';
  clearTimeout(tt);
  /* Small delay ensures the DOM updates before we show */
  setTimeout(function() {
    e.textContent = msg;
    e.className = 'toast show';
    tt = setTimeout(function() {
      e.className = 'toast';
    }, 2400);
  }, 30);
}

/* ── Confetti ── */
function launchConfetti() {
  var cols = ['#D4A843', '#F0C85A', '#C43525', '#E85040', '#F2E4C4', '#ffffff'];
  for (var i = 0; i < 40; i++) {
    (function(delay) {
      setTimeout(function() {
        var e = document.createElement('div');
        e.className = 'cfp';
        e.style.left = (Math.random() * 100) + 'vw';
        e.style.background = cols[Math.floor(Math.random() * cols.length)];
        var dur = (1.6 + Math.random() * 2).toFixed(2) + 's';
        e.style.cssText += ';-webkit-animation:cf ' + dur + ' linear forwards;animation:cf ' + dur + ' linear forwards;';
        document.body.appendChild(e);
        setTimeout(function() { if (e.parentNode) e.parentNode.removeChild(e); }, 4500);
      }, delay);
    })(i * 55);
  }
}

render();
</script>
