<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Balot">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#12100d">
<title>بالوت | Balot</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2312100d'/><text y='76' x='50' text-anchor='middle' font-size='64' fill='%23d4a843'>♠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{
  margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── DESIGN TOKENS ── */
:root{
/* Background layers — dark but NOT pitch black */
–bg-base:      #12100d;
–bg-surface:   #1c1914;   /* cards, inputs */
–bg-elevated:  #252017;   /* hover / active surfaces */
–bg-overlay:   #2e2820;   /* modal, toast bg */

/* Borders — clearly visible */
–border-subtle:  rgba(212,168,67,0.22);
–border-normal:  rgba(212,168,67,0.45);
–border-strong:  rgba(212,168,67,0.75);

/* Gold palette — rich, readable */
–gold-dim:   #a07d30;
–gold:       #d4a843;
–gold-light: #f0c95a;
–gold-text:  #f5d878;   /* for text on dark bg */

/* Red palette */
–red-dim:    #8b2218;
–red:        #c43525;
–red-light:  #e84835;

/* Text hierarchy */
–text-primary:   #f5ead8;   /* main content */
–text-secondary: #b8a888;   /* labels, hints */
–text-muted:     #6e6048;   /* placeholder, disabled */

/* Team accent colors */
–t1: #f0c95a;   /* Team 1 — gold */
–t2: #e84835;   /* Team 2 — red */

/* Sizing */
–r: 14px;
–st: env(safe-area-inset-top, 0px);
–sb: env(safe-area-inset-bottom, 0px);
}

/* ── BASE ── */
html,body{height:100%;background:var(–bg-base);overscroll-behavior:none}
body{
font-family:‘Cinzel’,serif;
display:-webkit-flex;display:flex;
-webkit-justify-content:center;justify-content:center;
}

/* ── APP SHELL ── */
#app{
width:100%;max-width:430px;min-height:100%;
background:var(–bg-base);
display:-webkit-flex;display:flex;
-webkit-flex-direction:column;flex-direction:column;
overflow-x:hidden;
padding-bottom:calc(32px + var(–sb));
}

/* ════════════════════════════
HEADER
════════════════════════════ */
.hdr{
padding:calc(var(–st) + 24px) 20px 20px;
text-align:center;
background:var(–bg-surface);
border-bottom:2px solid var(–border-normal);
}
.hdr-suits{
display:-webkit-flex;display:flex;
-webkit-justify-content:center;justify-content:center;
gap:14px;margin-bottom:8px;font-size:18px;line-height:1;
}
.sb{color:#e0e0e0}
.sr{color:var(–red-light)}
.hdr-title{
font-family:‘Cinzel Decorative’,serif;
font-size:28px;letter-spacing:5px;
color:var(–gold-text);
/* safe gradient text — fallback is the color above */
background:linear-gradient(135deg,var(–gold) 0%,var(–gold-text) 55%,var(–gold) 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
}
/* Firefox fallback */
@-moz-document url-prefix(){
.hdr-title{background:none;-moz-text-fill-color:var(–gold-text);color:var(–gold-text)}
}
.hdr-sub{
font-family:‘Amiri’,serif;font-size:14px;
color:var(–text-secondary);letter-spacing:2px;margin-top:4px;
}

/* ════════════════════════════
SETTINGS BAR
════════════════════════════ */
.settings{
display:-webkit-flex;display:flex;
gap:10px;padding:14px 14px 0;
-webkit-align-items:center;align-items:center;
}
.tgt-wrap{
-webkit-flex:1;flex:1;
display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;
gap:10px;
background:var(–bg-surface);
border:1.5px solid var(–border-normal);
border-radius:12px;padding:11px 14px;min-width:0;
}
.tgt-lbl{
font-size:11px;color:var(–text-secondary);
letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;
}
.tgt-input{
-webkit-flex:1;flex:1;background:transparent;border:none;outline:none;
color:var(–gold-text);font-family:‘Cinzel’,serif;font-size:16px;
text-align:right;width:0;min-width:0;font-weight:600;
-webkit-appearance:none;-moz-appearance:textfield;appearance:none;
}
.tgt-input::-webkit-inner-spin-button,
.tgt-input::-webkit-outer-spin-button{display:none}

.reset-btn{
background:rgba(196,53,37,0.15);
border:1.5px solid rgba(196,53,37,0.45);
border-radius:12px;
color:#f07060;
font-family:‘Cinzel’,serif;font-size:11px;letter-spacing:1px;
padding:12px 16px;cursor:pointer;white-space:nowrap;
-webkit-appearance:none;appearance:none;
-webkit-transition:background .18s;transition:background .18s;
}
.reset-btn:active{background:rgba(196,53,37,0.30);color:#ff8070}

/* ════════════════════════════
SCOREBOARD
════════════════════════════ */
.scoreboard{
display:-webkit-flex;display:flex;
gap:12px;padding:14px 14px 0;
}
.tcard{
-webkit-flex:1;flex:1;
background:var(–bg-surface);
border:1.5px solid var(–border-subtle);
border-radius:var(–r);padding:16px 12px 14px;
text-align:center;position:relative;overflow:hidden;
-webkit-transition:border-color .25s,box-shadow .25s;
transition:border-color .25s,box-shadow .25s;
}
/* Coloured top accent bar */
.tcard::before{
content:’’;position:absolute;top:0;left:0;right:0;height:3px;
}
#c1::before{background:linear-gradient(90deg,transparent,var(–t1),transparent)}
#c2::before{background:linear-gradient(90deg,transparent,var(–t2),transparent)}

.tcard.win{
border-color:var(–border-strong);
box-shadow:0 0 22px rgba(212,168,67,0.18);
}

/* Editable team name */
.tname{
font-family:‘Amiri’,serif;font-size:16px;font-weight:700;
color:var(–text-primary);background:transparent;
border:none;border-bottom:1.5px solid var(–border-subtle);
text-align:center;width:100%;outline:none;
padding:2px 4px 4px;margin-bottom:12px;display:block;
-webkit-appearance:none;appearance:none;letter-spacing:0.5px;
-webkit-transition:border-color .2s;transition:border-color .2s;
}
.tname:focus{border-bottom-color:var(–border-strong)}
.tname::placeholder{color:var(–text-muted)}

.tscore{
font-family:‘Cinzel Decorative’,serif;
font-size:48px;line-height:1;
color:var(–gold-text);display:inline-block;
-webkit-transition:color .25s;transition:color .25s;
}
#c1 .tscore{color:var(–t1)}
#c2 .tscore{color:var(–t2)}

.twins{
margin-top:8px;font-size:10px;
color:var(–text-muted);letter-spacing:1px;text-transform:uppercase;
}
.twins b{color:var(–text-secondary);font-weight:600}

/* ════════════════════════════
PROGRESS BARS
════════════════════════════ */
.prog-sec{padding:12px 14px 0}
.prog-row{
display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;
gap:10px;margin-bottom:7px;
}
.prog-name{
font-size:11px;color:var(–text-secondary);letter-spacing:0.5px;
min-width:54px;max-width:70px;
overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.prog-track{
-webkit-flex:1;flex:1;height:7px;
background:rgba(255,255,255,0.07);
border-radius:10px;overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
}
.prog-fill{
height:100%;border-radius:10px;
-webkit-transition:width .5s ease;transition:width .5s ease;width:0;
}
.f1{background:linear-gradient(90deg,#b8860b,var(–gold-text))}
.f2{background:linear-gradient(90deg,#8b2218,var(–red-light))}
.prog-val{
font-size:11px;font-weight:600;
min-width:32px;text-align:right;
}
.prog-val.v1{color:var(–t1)}
.prog-val.v2{color:var(–t2)}

/* ════════════════════════════
SECTION DIVIDER
════════════════════════════ */
.sec-div{
display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;
gap:10px;padding:18px 14px 10px;
}
.sec-line{
-webkit-flex:1;flex:1;height:1px;
background:var(–bg-elevated);
border-top:1px solid var(–border-subtle);
}
.sec-txt{
font-size:9px;color:var(–text-muted);
letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap;
}

/* ════════════════════════════
ROUND ENTRY
════════════════════════════ */
.entry-sec{padding:0 14px}

.entry-grid{
display:-webkit-flex;display:flex;
gap:12px;margin-bottom:12px;
}
.eg{-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:6px}
.elbl{
font-size:10px;color:var(–text-secondary);
letter-spacing:1.5px;text-transform:uppercase;text-align:center;
}

/* Score inputs — the most important UI element, must be very clear */
.einput{
background:var(–bg-surface);
border:2px solid var(–border-normal);
border-radius:12px;
color:var(–text-primary);
font-family:‘Cinzel’,serif;font-size:32px;font-weight:600;
text-align:center;padding:14px 8px;
outline:none;width:100%;display:block;
-webkit-appearance:none;-moz-appearance:textfield;appearance:none;
-webkit-transition:border-color .2s,background .2s;
transition:border-color .2s,background .2s;
}
.einput::-webkit-inner-spin-button,
.einput::-webkit-outer-spin-button{display:none}
.einput:focus{
border-color:var(–border-strong);
background:var(–bg-elevated);
color:#fff;
}
#i1{color:var(–t1)}
#i2{color:var(–t2)}
#i1:focus{color:#fff}
#i2:focus{color:#fff}
.einput::placeholder{color:var(–text-muted)}

/* BID SECTION */
.bid-box{
background:var(–bg-surface);
border:1.5px solid var(–border-subtle);
border-radius:12px;padding:12px 14px;margin-bottom:12px;
}
.bid-lbl{
font-size:10px;color:var(–text-secondary);
letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;
}

/* Fully custom select — identical on all browsers */
.sel-wrap{position:relative}
.sel-wrap::after{
content:‘▾’;position:absolute;right:14px;top:50%;
-webkit-transform:translateY(-50%);transform:translateY(-50%);
color:var(–text-secondary);font-size:14px;
pointer-events:none;line-height:1;
}
.bid-sel{
width:100%;
background:var(–bg-elevated);
border:1.5px solid var(–border-normal);
border-radius:10px;
color:var(–text-primary);
font-family:‘Cinzel’,serif;font-size:16px;
padding:12px 38px 12px 14px;
outline:none;cursor:pointer;
-webkit-appearance:none;-moz-appearance:none;appearance:none;display:block;
}
.bid-sel::-ms-expand{display:none}
.bid-sel option{background:#1c1914;color:var(–text-primary)}

/* TOGGLE BUTTONS */
.toggles{
display:-webkit-flex;display:flex;
gap:10px;margin-bottom:12px;
}
.tog{
-webkit-flex:1;flex:1;
background:var(–bg-surface);
border:1.5px solid var(–border-subtle);
border-radius:12px;
color:var(–text-secondary);
font-family:‘Cinzel’,serif;font-size:10px;letter-spacing:0.5px;
padding:11px 4px 9px;cursor:pointer;text-align:center;line-height:1.5;
-webkit-appearance:none;appearance:none;display:block;width:100%;
-webkit-transition:background .18s,border-color .18s,color .18s;
transition:background .18s,border-color .18s,color .18s;
}
.tog-icon{font-size:16px;display:block;margin-bottom:3px;color:var(–text-muted)}
.tog.on{
background:rgba(212,168,67,0.15);
border-color:var(–border-strong);
color:var(–gold-text);
}
.tog.on .tog-icon{color:var(–gold)}
.tog:active{opacity:.75}

/* ADD ROUND BUTTON — most prominent action */
.add-btn{
width:100%;
background:var(–gold);
border:none;border-radius:14px;
color:#12100d;
font-family:‘Cinzel’,serif;font-size:15px;font-weight:600;
letter-spacing:2px;text-transform:uppercase;
padding:17px;cursor:pointer;
-webkit-appearance:none;appearance:none;display:block;
-webkit-transition:background .18s,-webkit-transform .12s;
transition:background .18s,transform .12s;
box-shadow:0 4px 16px rgba(212,168,67,0.28);
}
.add-btn:active{
background:var(–gold-light);
-webkit-transform:scale(.98);transform:scale(.98);
}

/* ════════════════════════════
HISTORY
════════════════════════════ */
.hist-sec{padding:0 14px}
.hist-hdr{
display:-webkit-flex;display:flex;
-webkit-justify-content:space-between;justify-content:space-between;
-webkit-align-items:center;align-items:center;
margin-bottom:10px;
}
.hist-ttl{
font-size:10px;color:var(–text-muted);
letter-spacing:2px;text-transform:uppercase;
}
.clr-btn{
font-family:‘Cinzel’,serif;font-size:10px;letter-spacing:1px;
color:#f07060;background:rgba(196,53,37,0.12);
border:1px solid rgba(196,53,37,0.30);
border-radius:8px;padding:6px 12px;cursor:pointer;
-webkit-appearance:none;appearance:none;
-webkit-transition:background .18s;transition:background .18s;
}
.clr-btn:active{background:rgba(196,53,37,0.25)}

.rlist{
display:-webkit-flex;display:flex;
-webkit-flex-direction:column;flex-direction:column;
gap:8px;max-height:260px;overflow-y:auto;
-webkit-overflow-scrolling:touch;
overscroll-behavior:contain;padding-right:2px;
}
.rlist::-webkit-scrollbar{width:3px}
.rlist::-webkit-scrollbar-track{background:transparent}
.rlist::-webkit-scrollbar-thumb{background:var(–border-subtle);border-radius:10px}

/* Individual round row */
.rrow{
background:var(–bg-surface);
border:1.5px solid rgba(255,255,255,0.07);
border-radius:12px;padding:11px 12px;
display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;
gap:8px;-webkit-flex-wrap:wrap;flex-wrap:wrap;
-webkit-animation:sIn .22s ease;animation:sIn .22s ease;
}
@-webkit-keyframes sIn{from{opacity:0;-webkit-transform:translateY(-5px)}to{opacity:1;-webkit-transform:none}}
@keyframes sIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}

.rn{
font-size:10px;color:var(–text-muted);
border:1px solid rgba(255,255,255,0.10);border-radius:50%;
width:22px;height:22px;
display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;
-webkit-justify-content:center;justify-content:center;
-webkit-flex-shrink:0;flex-shrink:0;
}
.rt{
-webkit-flex:1;flex:1;font-size:10px;
color:var(–text-secondary);text-align:center;
overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.rp{
font-family:‘Cinzel Decorative’,serif;font-size:18px;
min-width:38px;text-align:center;font-weight:700;
}
.rp.g{color:var(–t1)}
.rp.r{color:var(–t2)}
.rsep{font-size:11px;color:rgba(255,255,255,0.18)}
.rdel{
background:none;border:none;
color:rgba(230,80,60,0.40);
font-size:15px;padding:3px 5px;cursor:pointer;
-webkit-appearance:none;appearance:none;
-webkit-flex-shrink:0;flex-shrink:0;line-height:1;
-webkit-transition:color .18s;transition:color .18s;
}
.rdel:active{color:var(–red-light)}

.rtags{
width:100%;display:-webkit-flex;display:flex;
gap:5px;-webkit-flex-wrap:wrap;flex-wrap:wrap;
margin-top:4px;padding-left:30px;
}
.tag{
font-size:9px;padding:3px 8px;border-radius:20px;
letter-spacing:0.5px;font-family:‘Cinzel’,serif;font-weight:600;
}
.tag.bid    {background:rgba(100,10,10,.35); color:#f09080; border:1px solid rgba(196,53,37,.40)}
.tag.dbl    {background:rgba(170,130,35,.18);color:#f5d878; border:1px solid rgba(212,168,67,.35)}
.tag.rdbl   {background:rgba(180,40,30,.20); color:#f08070; border:1px solid rgba(196,53,37,.35)}
.tag.hkm    {background:rgba(15,80,40,.28);  color:#60d890; border:1px solid rgba(15,100,45,.40)}

/* Empty state */
.empty{
text-align:center;padding:28px 0;
color:var(–text-muted);font-size:12px;letter-spacing:1px;
}
.empty-ic{font-size:32px;display:block;margin-bottom:8px}

/* ════════════════════════════
WINNER MODAL
════════════════════════════ */
.overlay{
position:fixed;inset:0;
background:rgba(0,0,0,0.85);z-index:999;
display:-webkit-flex;display:flex;
-webkit-align-items:center;align-items:center;
-webkit-justify-content:center;justify-content:center;
opacity:0;pointer-events:none;
-webkit-transition:opacity .35s;transition:opacity .35s;
-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
}
.overlay.show{opacity:1;pointer-events:all}

.wcard{
background:var(–bg-surface);
border:2px solid var(–border-strong);
border-radius:22px;
padding:36px 28px 30px;text-align:center;
width:min(310px,86vw);
box-shadow:0 0 60px rgba(212,168,67,0.22),0 24px 60px rgba(0,0,0,0.7);
-webkit-transform:scale(.88);transform:scale(.88);
-webkit-transition:-webkit-transform .4s cubic-bezier(.34,1.56,.64,1);
transition:transform .4s cubic-bezier(.34,1.56,.64,1);
}
.overlay.show .wcard{-webkit-transform:scale(1);transform:scale(1)}

.wsuits{font-size:28px;letter-spacing:12px;margin-bottom:14px}
.wlbl{
font-size:10px;color:var(–text-secondary);
letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;
}
.wname{
font-family:‘Cinzel Decorative’,serif;font-size:28px;
color:var(–gold-text);margin-bottom:10px;word-break:break-word;
}
.wscore{
font-family:‘Amiri’,serif;font-size:18px;
color:var(–text-secondary);margin-bottom:26px;
}
.ng-btn{
background:var(–gold);border:none;border-radius:12px;
color:#12100d;font-family:‘Cinzel’,serif;font-size:14px;
font-weight:700;letter-spacing:2px;text-transform:uppercase;
padding:14px 36px;cursor:pointer;
-webkit-appearance:none;appearance:none;
box-shadow:0 4px 16px rgba(212,168,67,0.30);
}
.ng-btn:active{opacity:.85}

/* ════════════════════════════
TOAST
════════════════════════════ */
.toast{
position:fixed;
bottom:calc(28px + var(–sb));left:50%;
-webkit-transform:translateX(-50%) translateY(70px);
transform:translateX(-50%) translateY(70px);
background:var(–bg-overlay);
border:1.5px solid var(–border-normal);
border-radius:22px;padding:11px 22px;
color:var(–text-primary);font-size:13px;letter-spacing:0.5px;
z-index:1000;white-space:nowrap;
-webkit-transition:-webkit-transform .3s cubic-bezier(.34,1.56,.64,1);
transition:transform .3s cubic-bezier(.34,1.56,.64,1);
-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
box-shadow:0 6px 24px rgba(0,0,0,0.5);
}
.toast.show{
-webkit-transform:translateX(-50%) translateY(0);
transform:translateX(-50%) translateY(0);
}

/* Flash animation */
@-webkit-keyframes flash{
0%,100%{-webkit-transform:scale(1)}
40%{-webkit-transform:scale(1.12)}
}
@keyframes flash{
0%,100%{transform:scale(1)}
40%{transform:scale(1.12)}
}
.flash{
display:inline-block;
-webkit-animation:flash .35s ease;animation:flash .35s ease;
}

/* Confetti */
.cfp{
position:fixed;width:8px;height:8px;border-radius:2px;
pointer-events:none;z-index:998;
}
@-webkit-keyframes cf{
from{opacity:1;-webkit-transform:translateY(-20px) rotate(0deg)}
to  {opacity:0;-webkit-transform:translateY(110vh) rotate(720deg)}
}
@keyframes cf{
from{opacity:1;transform:translateY(-20px) rotate(0deg)}
to  {opacity:0;transform:translateY(110vh) rotate(720deg)}
}
</style>

</head>
<body>
<div id="app">

  <!-- HEADER -->

  <div class="hdr">
    <div class="hdr-suits">
      <span class="sb">♠</span><span class="sr">♥</span>
      <span class="sr">♦</span><span class="sb">♣</span>
    </div>
    <div class="hdr-title">BALOT</div>
    <div class="hdr-sub">حاسبة البالوت</div>
  </div>

  <!-- SETTINGS -->

  <div class="settings">
    <div class="tgt-wrap">
      <span class="tgt-lbl">Target</span>
      <input class="tgt-input" id="tgt" type="number" value="152"
             inputmode="numeric" pattern="[0-9]*" min="50" max="999">
    </div>
    <button class="reset-btn" onclick="resetGame()">&#8635; Reset</button>
  </div>

  <!-- SCOREBOARD -->

  <div class="scoreboard">
    <div class="tcard" id="c1">
      <input class="tname" id="n1" value="فريق ١" placeholder="Team 1">
      <div class="tscore" id="s1">0</div>

<div class="overlay" id="ov">

<!-- TOAST -->

<div class="toast" id="toast"></div>

<script>
var G={s1:0,s2:0,w1:0,w2:0,rounds:[],d:false,r:false,h:false};

function el(id){return document.getElementById(id)}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* Name sync */
function syncNames(){
  var t1=el('n1').value||'Team 1',t2=el('n2').value||'Team 2';
  el('l1').textContent=t1;el('l2').textContent=t2;
  el('pn1').textContent=t1;el('pn2').textContent=t2;
  el('bid').options[1].text=t1+' — Bid';
  el('bid').options[2].text=t2+' — Bid';
}
el('n1').addEventListener('input',syncNames);
el('n2').addEventListener('input',syncNames);
el('tgt').addEventListener('input',updateProg);
syncNames();

/* Toggles */
function tog(k){
  if(k==='d'){G.d=!G.d;if(G.d)G.r=false}
  else if(k==='r'){G.r=!G.r;if(G.r)G.d=false}
  else{G.h=!G.h}
  el('bD').className='tog'+(G.d?' on':'');
  el('bR').className='tog'+(G.r?' on':'');
  el('bH').className='tog'+(G.h?' on':'');
}

/* Add round */
function addRound(){
  var r1=parseInt(el('i1').value)||0;
  var r2=parseInt(el('i2').value)||0;
  var bid=el('bid').value;
  if(!r1&&!r2){toast('Enter scores first');return}
  var p1=r1,p2=r2,m=G.r?4:G.d?2:1;
  if(G.h){if(p1>p2)p1+=30;else if(p2>p1)p2+=30}
  if(bid){
    var bs=bid==='1'?p1:p2;
    if(bs<77){
      if(bid==='1'){p2+=p1;p1=0}else{p1+=p2;p2=0}
      toast('Bid failed! Opponent takes all');
    }
  }
  p1=Math.round(p1*m);p2=Math.round(p2*m);
  G.s1+=p1;G.s2+=p2;
  if(p1>p2)G.w1++;else if(p2>p1)G.w2++;
  var tags=[];
  if(bid)tags.push({c:'bid',l:'BID'});
  if(G.d)tags.push({c:'dbl',l:'×2'});
  if(G.r)tags.push({c:'rdbl',l:'×4'});
  if(G.h)tags.push({c:'hkm',l:'HOKM'});
  G.rounds.push({p1:p1,p2:p2,tags:tags});
  el('i1').value='';el('i2').value='';
  el('bid').value='';G.d=false;G.r=false;G.h=false;
  el('bD').className='tog';el('bR').className='tog';el('bH').className='tog';
  el('i1').placeholder='0';el('i2').placeholder='0';
  render();
  if(!checkWin())toast('Round added!');
}

/* Render */
function render(){
  flashScore('s1',G.s1,'tscore');
  flashScore('s2',G.s2,'tscore');
  el('w1').textContent=G.w1;el('w2').textContent=G.w2;
  var win1=G.s1>G.s2,win2=G.s2>G.s1;
  el('c1').className='tcard'+(win1?' win':'');
  el('c2').className='tcard'+(win2?' win':'');
  updateProg();renderList();
}

function flashScore(id,val,cls){
  var e=el(id);e.textContent=val;
  e.className=cls;void e.offsetWidth;e.className=cls+' flash';
}

function updateProg(){
  var tgt=parseInt(el('tgt').value)||152;
  el('pb1').style.width=Math.min(100,(G.s1/tgt)*100)+'%';
  el('pb2').style.width=Math.min(100,(G.s2/tgt)*100)+'%';
  el('pv1').textContent=G.s1;el('pv2').textContent=G.s2;
}

function renderList(){
  var list=el('rl');
  if(!G.rounds.length){
    list.innerHTML='<div class="empty"><span class="empty-ic">🃏</span>No rounds yet — start the game!</div>';
    return;
  }
  var t1=esc(el('n1').value||'T1'),t2=esc(el('n2').value||'T2');
  list.innerHTML=G.rounds.map(function(r,i){
    var tg=r.tags.map(function(t){return'<span class="tag '+t.c+'">'+t.l+'</span>'}).join('');
    return'<div class="rrow">'+
      '<div class="rn">'+(i+1)+'</div>'+
      '<div class="rt">'+t1+'</div>'+
      '<div class="rp g">'+r.p1+'</div>'+
      '<div class="rsep">|</div>'+
      '<div class="rp r">'+r.p2+'</div>'+
      '<div class="rt">'+t2+'</div>'+
      '<button class="rdel" onclick="delRound('+i+')">✕</button>'+
      (tg?'<div class="rtags">'+tg+'</div>':'')+
    '</div>';
  }).reverse().join('');
}

function delRound(i){
  var r=G.rounds[i];
  G.s1-=r.p1;G.s2-=r.p2;
  if(r.p1>r.p2)G.w1=Math.max(0,G.w1-1);
  else if(r.p2>r.p1)G.w2=Math.max(0,G.w2-1);
  G.rounds.splice(i,1);render();toast('Round removed');
}

function clearAll(){
  if(!G.rounds.length)return;
  G.rounds=[];G.s1=0;G.s2=0;G.w1=0;G.w2=0;render();toast('Cleared');
}

function checkWin(){
  var tgt=parseInt(el('tgt').value)||152,w=0;
  if(G.s1>=tgt&&G.s1>=G.s2)w=1;
  else if(G.s2>=tgt&&G.s2>G.s1)w=2;
  if(!w)return false;
  el('wn').textContent=w===1?(el('n1').value||'Team 1'):(el('n2').value||'Team 2');
  el('ws').textContent=G.s1+' — '+G.s2;
  el('ov').className='overlay show';
  confetti();return true;
}

function resetGame(){
  G={s1:0,s2:0,w1:0,w2:0,rounds:[],d:false,r:false,h:false};
  el('ov').className='overlay';
  el('i1').value='';el('i2').value='';el('bid').value='';
  el('bD').className='tog';el('bR').className='tog';el('bH').className='tog';
  render();toast('New game started!');
}

/* Auto-hint */
el('i1').addEventListener('input',function(){
  var v=parseInt(this.value);
  el('i2').placeholder=(!isNaN(v)&&v>=0)?Math.max(0,152-v):'0';
});
el('i2').addEventListener('input',function(){
  var v=parseInt(this.value);
  el('i1').placeholder=(!isNaN(v)&&v>=0)?Math.max(0,152-v):'0';
});

/* Toast */
var tt;
function toast(msg){
  var e=el('toast');e.textContent=msg;e.className='toast show';
  clearTimeout(tt);tt=setTimeout(function(){e.className='toast'},2200);
}

/* Confetti */
function confetti(){
  var cols=['#d4a843','#f0c95a','#c43525','#e84835','#f5ead8','#ffffff'];
  for(var i=0;i<40;i++){
    (function(d){
      setTimeout(function(){
        var e=document.createElement('div');e.className='cfp';
        e.style.left=(Math.random()*100)+'vw';
        e.style.background=cols[Math.floor(Math.random()*cols.length)];
        var dur=(1.6+Math.random()*2).toFixed(2)+'s';
        e.style.cssText+=';-webkit-animation:cf '+dur+' linear forwards;animation:cf '+dur+' linear forwards;';
        document.body.appendChild(e);
        setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e)},4000);
      },d);
    })(i*55);
  }
}

render();
</script>
